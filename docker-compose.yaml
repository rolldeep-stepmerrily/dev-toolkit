services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: local
      POSTGRES_PASSWORD: local1234!
      POSTGRES_DB: localDB
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - local-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - local-network

volumes:
  postgres_data:
  redis_data:

networks:
  local-network:
    driver: bridge
